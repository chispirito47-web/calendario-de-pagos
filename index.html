  <script>
  // Intercept localStorage to sync with Supabase
  (function(){
    const TABLE = 'pagos_proveedores';
    const KEY = 'casadams_pagos';

    // Override setItem to also save to Supabase
    const origSet = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function(k, v) {
      origSet(k, v);
      if (k !== KEY) return;
      try {
        const data = JSON.parse(v);
        if (!data || !Array.isArray(data.payments)) return;
        // Sync all payments to Supabase (upsert)
        window._sb.from(TABLE).upsert(
          data.payments.map(p => ({
            id: p.id,
            proveedor: p.proveedor,
            categoria: p.categoria || '',
            monto: p.monto,
            fecha: p.fecha,
            factura: p.factura === '—' ? '' : (p.factura || ''),
            estado: p.estado || 'pendiente',
            nota: p.nota || ''
          }))
        ).then(({error}) => { if(error) console.warn('Supabase sync:', error.message); });
      } catch(e) {}
    };

    // On page load, try to restore from Supabase first
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const { data, error } = await window._sb.from(TABLE).select('*').order('fecha');
        if (error || !data || data.length === 0) return;
        const payments = data.map(r => ({
          id: r.id,
          proveedor: r.proveedor,
          categoria: r.categoria || '',
          monto: Number(r.monto),
          fecha: r.fecha,
          factura: r.factura || '',
          estado: r.estado || 'pendiente',
          nota: r.nota || ''
        }));
        const maxId = Math.max(...payments.map(p => p.id), 0) + 1;
        // Inject into localStorage so the app picks it up
        origSet(KEY, JSON.stringify({ payments, nextId: maxId }));
        // Reload so the app re-reads localStorage with Supabase data
        // Only reload once (use sessionStorage flag)
        if (!sessionStorage.getItem('_sb_loaded')) {
          sessionStorage.setItem('_sb_loaded', '1');
          location.reload();
        }
      } catch(e) { console.warn('Supabase load error:', e); }
    });
  })();
  </script>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

thumb{background:#d8cfbd;border-radius:8px;border:2px solid transparent;background-clip:content-box}\n  ::-webkit-scrollbar-track{background:transparent}\n  @media (max-width:880px){\n    .bodygrid{grid-template-columns:1fr !important}\n    .sumgrid{grid-template-columns:1fr 1fr !important}\n  }\n  @media (min-width:620px){ .todaypill{display:flex !important} }\n  @media (max-width:520px){ .sumgrid{grid-template-columns:1fr !important} }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#F3EFE7;font-family:Manrope,system-ui,sans-serif;color:#241F19;-webkit-font-smoothing:antialiased\">\n\n  <!-- HEADER -->\n  <header style=\"position:sticky;top:0;z-index:30;background:#16110C;border-bottom:1px solid #2c2419;box-shadow:0 6px 24px rgba(0,0,0,.18)\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:16px\">\n      <div style=\"width:46px;height:46px;border-radius:11px;background:#0C0906;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;border:1px solid #3a2f1d\">\n        <img src=\"374988c8-dde6-4528-99c9-b02f786a2e11\" alt=\"Casa Dams\" style=\"width:100%;height:100%;object-fit:contain\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;line-height:1\">\n        <span style=\"font-family:'Cormorant Garamond',serif;font-weight:700;font-size:21px;letter-spacing:.32em;color:#C9A368;text-indent:.32em;white-space:nowrap\">CASA DAMS<\u002Fspan>\n        <span style=\"font-size:11px;color:#8a7c63;letter-spacing:.04em;margin-top:4px\">Calendario de pagos · Proveedores<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div style=\"display:none;align-items:center;gap:8px;padding:7px 13px;border-radius:9px;background:#221a10;border:1px solid #3a2f1d;color:#cdb189;font-size:12.5px;font-weight:600\" class=\"todaypill\">\n        <span style=\"width:7px;height:7px;border-radius:50%;background:#C9A368\"><\u002Fspan>Hoy · {{ hoyLabel }}\n      <\u002Fdiv>\n      <button onclick=\"{{ openRegister }}\" style=\"display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;border:none;background:linear-gradient(180deg,#D2AC6E,#BE9450);color:#1c1306;font-weight:700;font-size:13.5px;cursor:pointer;box-shadow:0 4px 14px rgba(190,148,80,.35)\" style-hover=\"filter:brightness(1.05)\">\n        <span style=\"font-size:17px;line-height:1;margin-top:-1px\">+<\u002Fspan> Registrar pago\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1320px;margin:0 auto;padding:24px 22px 60px\">\n\n    <!-- SUMMARY -->\n    <section style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px\" class=\"sumgrid\">\n      <div style=\"background:#fff;border:1px solid #ece4d4;border-radius:15px;padding:17px 18px;position:relative;overflow:hidden\">\n        <div style=\"position:absolute;left:0;top:0;bottom:0;width:4px;background:#C29A5C\"><\u002Fdiv>\n        <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9a8f7e\">Pendiente del mes<\u002Fdiv>\n        <div style=\"font-size:25px;font-weight:800;margin-top:8px;font-variant-numeric:tabular-nums;color:#241F19;letter-spacing:-.01em\">{{ sum.pend.fmt }}<\u002Fdiv>\n        <div style=\"font-size:12px;color:#8b8175;margin-top:5px\">{{ sum.pend.count }} facturas por pagar<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ece4d4;border-radius:15px;padding:17px 18px;position:relative;overflow:hidden\">\n        <div style=\"position:absolute;left:0;top:0;bottom:0;width:4px;background:#D08A2A\"><\u002Fdiv>\n        <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9a8f7e\">Próxima semana<\u002Fdiv>\n        <div style=\"font-size:25px;font-weight:800;margin-top:8px;font-variant-numeric:tabular-nums;color:#241F19;letter-spacing:-.01em\">{{ sum.semana.fmt }}<\u002Fdiv>\n        <div style=\"font-size:12px;color:#8b8175;margin-top:5px\">{{ sum.semana.count }} vencen en 7 días<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ece4d4;border-radius:15px;padding:17px 18px;position:relative;overflow:hidden\">\n        <div style=\"position:absolute;left:0;top:0;bottom:0;width:4px;background:#B23A2E\"><\u002Fdiv>\n        <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9a8f7e\">Vencido<\u002Fdiv>\n        <div style=\"font-size:25px;font-weight:800;margin-top:8px;font-variant-numeric:tabular-nums;color:#B23A2E;letter-spacing:-.01em\">{{ sum.vencido.fmt }}<\u002Fdiv>\n        <div style=\"font-size:12px;color:#8b8175;margin-top:5px\">{{ sum.vencido.count }} sin pagar a tiempo<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ece4d4;border-radius:15px;padding:17px 18px;position:relative;overflow:hidden\">\n        <div style=\"position:absolute;left:0;top:0;bottom:0;width:4px;background:#6E8A5C\"><\u002Fdiv>\n        <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9a8f7e\">Pagado este mes<\u002Fdiv>\n        <div style=\"font-size:25px;font-weight:800;margin-top:8px;font-variant-numeric:tabular-nums;color:#5E7A4F;letter-spacing:-.01em\">{{ sum.pagado.fmt }}<\u002Fdiv>\n        <div style=\"font-size:12px;color:#8b8175;margin-top:5px\">{{ sum.pagado.count }} pagos realizados<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- BANNER -->\n    <sc-if value=\"{{ hasBanner }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;align-items:center;gap:16px;background:linear-gradient(100deg,#1d160e,#2a2014);border:1px solid #5a4524;border-radius:15px;padding:16px 20px;margin-bottom:18px;box-shadow:0 8px 26px rgba(40,28,8,.2)\">\n        <div style=\"width:42px;height:42px;border-radius:11px;background:rgba(201,163,104,.16);display:flex;align-items:center;justify-content:center;flex-shrink:0\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#D2AC6E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4M12 17h.01\"><\u002Fpath><path d=\"M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:0\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#D2AC6E;margin-bottom:3px\">Reserva el flujo de caja<\u002Fdiv>\n          <div style=\"font-size:14.5px;color:#efe6d4;line-height:1.45\">El <strong style=\"color:#fff\">{{ banner.fecha }}<\u002Fstrong> vence una factura grande de <strong style=\"color:#D2AC6E\">{{ banner.monto }}<\u002Fstrong> a {{ banner.prov }}. Evita comprometer ese dinero antes de la fecha.<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ banner.onOpen }}\" style=\"flex-shrink:0;padding:9px 15px;border-radius:9px;border:1px solid #6a532c;background:rgba(201,163,104,.12);color:#E4C99A;font-weight:600;font-size:12.5px;cursor:pointer\" style-hover=\"background:rgba(201,163,104,.22)\">Ver detalle<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- BODY GRID -->\n    <div style=\"display:grid;grid-template-columns:1.75fr 1fr;gap:18px;align-items:start\" class=\"bodygrid\">\n\n      <!-- CALENDAR -->\n      <section style=\"background:#fff;border:1px solid #ece4d4;border-radius:18px;padding:18px 18px 8px;box-shadow:0 4px 18px rgba(60,45,20,.05)\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px\">\n          <h2 style=\"margin:0;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:26px;color:#241F19;letter-spacing:.01em\">{{ monthLabel }}<\u002Fh2>\n          <div style=\"flex:1\"><\u002Fdiv>\n          <button onclick=\"{{ goToday }}\" style=\"padding:7px 12px;border-radius:8px;border:1px solid #e4 6-06-30', factura:'ID-7788', estado:'pendiente', nota:'Contenedor de sillas importadas' },\n      { id:13, proveedor:'Mantenimiento Maquinaria',categoria:'Servicios',   monto:1050000, fecha:'2026-06-08', factura:'MM-19',   estado:'pagado',    nota:'Servicio router CNC' },\n      { id:14, proveedor:'Telas Premium Bogotá',  categoria:'Tapicería',     monto:1850000, fecha:'2026-06-16', factura:'TP-0501', estado:'pendiente', nota:'Refuerzo pedido tela gris' }\n    ]\n  };\n\n  meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];\n  mesAbbr = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];\n\n  toDate(s){ const p = s.split('-').map(Number); return new Date(p[0], p[1]-1, p[2]); }\n  diffDays(a, b){ return Math.round((this.toDate(b) - this.toDate(a)) / 86400000); }\n  pad(n){ return n<10 ? '0'+n : ''+n; }\n\n  fmt(n){ const s = Math.round(n).toString(); return '$' + s.replace(/\\B(?=(\\d{3})+(?!\\d))/g, '.'); }\n  fmtShort(n){\n    if (n >= 1e6){ let m = Math.round(n/1e5)/10; return (m % 1 === 0 ? m : m.toString().replace('.', ',')) + 'M'; }\n    if (n >= 1e3){ return Math.round(n/1e3) + 'K'; }\n    return '' + n;\n  }\n  fechaFmt(s){ const d = this.toDate(s); return d.getDate() + ' ' + this.mesAbbr[d.getMonth()]; }\n\n  urgency(p){\n    if (p.estado === 'pagado') return 'pagado';\n    const win = (this.props.diasProxima ?? 7);\n    const d = this.diffDays(this.today, p.fecha);\n    if (d < 0) return 'vencido';\n    if (d <= win - 1) return 'semana';\n    return 'proximo';\n  }\n  meta(u){\n    const M = {\n      vencido: { label:'Vencido',     short:'Vencido',  color:'#B23A2E', bg:'#FBEDE9', dot:'#B23A2E' },\n      semana:  { label:'Esta semana', short:'7 días',   color:'#C07A1E', bg:'#FBF1E0', dot:'#D08A2A' },\n      proximo: { label:'Próximo',     short:'Próximo',  color:'#9A742E', bg:'#F7F0E0', dot:'#C29A5C' },\n      pagado:  { label:'Pagado',      short:'Pagado',   color:'#5E7A4F', bg:'#EEF2E8', dot:'#6E8A5C' }\n    };\n    return M[u];\n  }\n  decorate(p){\n    const u = this.urgency(p), m = this.meta(u);\n    return {\n      ...p, urg:u, label:m.label, urgShort:m.short, color:m.color, bg:m.bg, dot:m.dot,\n      montoFmt:this.fmt(p.monto), short:this.fmtShort(p.monto),\n      fechaFmt:this.fechaFmt(p.fecha), inicial:(p.proveedor[0]||'?').toUpperCase(),\n      prov: p.proveedor.length > 13 ? p.proveedor.slice(0,12)+'…' : p.proveedor,\n      isPaid: p.estado === 'pagado',\n      pillStyle: 'display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:'+m.color+';background:'+m.bg+';padding:4px 8px;border-radius:7px;white-space:nowrap;flex-shrink:0;min-width:54px',\n      tagStyle: 'display:inline-flex;font-size:10px;font-weight:700;color:'+m.color+';background:'+m.bg+';padding:1px 6px;border-radius:6px;white-space:nowrap',\n      avStyle: 'width:34px;height:34px;flex-shrink:0;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:'+m.color+';background:'+m.bg,\n      barStyle: 'display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:'+m.color+';background:'+m.bg+';border-left:3px solid '+m.dot+';border-radius:5px;padding:2px 5px;line-height:1.3;height:18px'\n    };\n  }\n\n  inView(p){ const d = this.toDate(p.fecha); return d.getFullYear() === this.state.viewY && d.getMonth() === this.state.viewM; }\n\n  setF(k, v){ this.setState(s => ({ form: { ...s.form, [k]: v }, errorMsg:'' })); }\n  openRegister = () => {\n    const def = this.state.selected || this.today;\n    this.setState(s => ({ modal:'register', errorMsg:'', form:{ proveedor:'', monto:'', categoria:'Materia prima', fecha:def, factura:'', nota:'' } }));\n  };\n  closeModal = () => this.setState({ modal:null });\n  selectDay = (key) => this.setState({ selected:key, modal:'day' });\n  registerOnDay = () => this.openRegister();\n  goToday = () => this.setState({ viewY:2026, viewM:5 });\n  prevMonth = () => this.setState(s => { let m=s.viewM-1, y=s.viewY; if(m<0){m=11;y--;} return {viewM:m, viewY:y}; });\n  nextMonth = () => this.setState(s => { let m=s.viewM+1, y=s.viewY; if(m>11){m=0;y++;} return {viewM:m, viewY:y}; });\n  togglePaid = (id) => this.setState(s => ({ payments: s.payments.map(p => p.id===id ? {...p, estado: p.estado==='pagado'?'pendiente':'pagado'} : p) }));\n  submit = () => {\n    const f = this.state.form;\n    const monto = Number((f.monto||'').replace(/\\D/g,''));\n    if (!f.proveedor.trim()){ this.setState({ errorMsg:'Escribe el nombre del proveedor.' }); return; }\n    if (!monto){ this.setState({ errorMsg:'Ingresa un monto válido.' }); return; }\n    this.setState(s => ({\n      modal:null,\n      nextId: s.nextId+1,\n      payments: [...s.payments, { id:s.nextId, proveedor:f.proveedor.trim(), categoria:f.categoria, monto, fecha:f.fecha, factura:f.factura.trim()||'—', estado:'pendiente', nota:f.nota.trim() }]\n    }));\n  };\n\n  renderVals(){\n    const st = this.state;\n    const all = st.payments.map(p => this.decorate(p));\n    const viewPays = all.filter(p => this.inView(p));\n    const sum = (arr) => arr.reduce((t,p)=>t+p.monto,0);\n\n    const pend = viewPays.filter(p => !p.isPaid);\n    const vencido = pend.filter(p => p.urg === 'vencido');\n    const semanaAll = all.filter(p => !p.isPaid && p.urg === 'semana');\n    const pagados = viewPays.filter(p => p.isPaid);\n\n    // calendar grid\n    const first = new Date(st.viewY, st.viewM, 1);\n    const startDow = (first.getDay() + 6) % 7;\n    const dim = new Date(st.viewY, st.viewM+1, 0).getDate();\n    const totalCells = Math.ceil((startDow + dim) / 7) * 7;\n    const byDay = {};\n    viewPays.forEach(p => { (byDay[p.fecha] = byDay[p.fecha] || []).push(p); });\n\n    const cells = [];\n    for (let i=0; i<totalCells; i++){\n      const dayNum = i - startDow + 1;\n      const inMonth = dayNum >= 1 && dayNum <= dim;\n      if (!inMonth){\n        cells.push({ inMonth:false, style:'min-height:96px;background:#faf8f3;border-right:1px solid #f1ebdd;border-bottom:1px solid #f1ebdd', onClick:null });\n        continue;\n      }\n      const key = st.viewY + '-' + this.pad(st.viewM+1) + '-' + this.pad(dayNum);\n      const items = (byDay[key] || []).sort((a,b)=>b.monto-a.monto);\n      const isToday = key === this.today;\n      const isSel = key === st.selected;\n      const hasOverdue = items.some(it => it.urg === 'vencido');\n      let bg = '#fff';\n      if (isSel) bg = '#FBF4E6'; else if (isToday) bg = '#fdfaf3';\n      cells.push({\n        inMonth:true, day:dayNum, key, isToday, hasOverdue,\n        onClick: () => this.selectDay(key),\n        style: 'min-height:96px;padding:6px 6px 7px;border-right:1px solid #f1ebdd;border-bottom:1px solid #f1ebdd;cursor:pointer;background:'+bg+(isSel?';box-shadow:inset 0 0 0 2px #C29A5C':'')+';transition:background .12s',\n        numStyle: isToday\n          ? 'display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#BE9450;color:#fff;font-size:12px;font-weight:800'\n          : 'font-size:12.5px;font-weight:700;color:#7a6f5d;padding-left:2px',\n        preview: items.slice(0,2),\n        moreLabel: items.length > 2 ? ('+'+(items.length-2)+' más') : ''\n      });\n    }\n    const weeks = [];\n    for (let i=0; i<cells.length; i+=7) weeks.push(cells.slice(i, i+7));\n\n    // banner\n    const umbral = (this.props.umbralGrande ?? 5000000);\n    const bigCandidates = all.filter(p => !p.isPaid && p.monto >= umbral && this.diffDays(this.today, p.fecha) >= 0)\n                             .sort((a,b)=> this.toDate(a.fecha) - this.toDate(b.fecha));\n    const big = bigCandidates[0];\n\n    // alerts: vencido + semana, sorted by date\n    const alerts = [...vencido, ...semanaAll]\n      .filter((p,i,arr)=>arr.findIndex(x=>x.id===p.id)===i)\n      .sort((a,b)=> this.toDate(a.fecha) - this.toDate(b.fecha))\n      .map(p => ({ ...p, onOpen: () => this.selectDay(p.fecha) }));\n\n    // pending list\n    const pendList = pend.slice().sort((a,b)=> this.toDate(a.fecha) - this.toDate(b.fecha))\n      .map(p => ({ ...p, onOpen: () => this.selectDay(p.fecha), onToggle: this.mkToggle(p.id) }));\n\n    // day modal\n    const dayItems = (st.selected ? (all.filter(p => p.fecha === st.selected)) : [])\n      .sort((a,b)=>b.monto-a.monto)\n      .map(p => ({\n        ...p,\n        onToggle: this.mkToggle(p.id),\n        toggleLabel: p.isPaid ? '✓ Pagado' : 'Marcar pagado',\n        toggleStyle: p.isPaid\n          ? 'margin-top:7px;padding:5px 10px;border-radius:8px;border:1px solid #cfe0c4;background:#eef4e7;color:#5E7A4F;font-size:11.5px;font-weight:700;cursor:pointer'\n          : 'margin-top:7px;padding:5px 10px;border-radius:8px;border:1px solid #e2d9c6;background:#fff;color:#9A742E;font-size:11.5px;font-weight:700;cursor:pointer'\n      }));\n    const dayTotalNum = dayItems.reduce((t,p)=>t+p.monto,0);\n    const dayLabel = st.selected ? this.longDate(st.selected) : '';\n\n    const montoNum = Number((st.form.monto||'').replace(/\\D/g,''));\n\n    return {\n      hoyLabel: this.longDate(this.today),\n      monthLabel: this.meses[st.viewM] + ' ' + st.viewY,\n      monthShort: this.mesAbbr[st.viewM] + '. ' + st.viewY,\n      weekdays: ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'],\n      weeks,\n      sum: {\n        pend:    { fmt:this.fmt(sum(pend)),    count:pend.length },\n        semana:  { fmt:this.fmt(sum(semanaAll.filter(p=>this.inView(p)))), count:semanaAll.filter(p=>this.inView(p)).length },\n        vencido: { fmt:this.fmt(sum(vencido)), count:vencido.length },\n        pagado:  { fmt:this.fmt(sum(pagados)), count:pagados.length }\n      },\n      hasBanner: !!big,\n      banner: big ? { fecha:this.longDate(big.fecha), monto:big.montoFmt, prov:big.proveedor, onOpen:()=>this.selectDay(big.fecha) } : {},\n      alerts, alertCount: alerts.length, noAlerts: alerts.length === 0,\n      pending: pendList, pendCount: pendList.length, noPending: pendList.length === 0,\n      showDay: st.modal === 'day',\n      showRegister: st.modal === 'register',\n      dayItems, noDayItems: dayItems.length === 0, dayLabel,\n      dayTotal: this.fmt(dayTotalNum),\n      form: st.form,\n      montoPreview: this.fmt(montoNum),\n      errorMsg: st.errorMsg,\n      openRegister: this.openRegister,\n      closeModal: this.closeModal,\n      goToday: this.goToday,\n      prevMonth: this.prevMonth,\n      nextMonth: this.nextMonth,\n      registerOnDay: this.registerOnDay,\n      submit: this.submit,\n      stop: (e) => e.stopPropagation(),\n      onProveedor: (e)=>this.setF('proveedor', e.target.value),\n      onMonto:     (e)=>this.setF('monto', e.target.value.replace(/\\D/g,'')),\n      onCategoria: (e)=>this.setF('categoria', e.target.value),\n      onFecha:     (e)=>this.setF('fecha', e.target.value),\n      onFactura:   (e)=>this.setF('factura', e.target.value),\n      onNota:      (e)=>this.setF('nota', e.target.value)\n    };\n  }\n\n  componentDidMount(){\n    try{\n      const raw = localStorage.getItem('casadams_pagos');\n      if(raw){ const d = JSON.parse(raw); if(d && Array.isArray(d.payments)) this.setState({ payments:d.payments, nextId:d.nextId || this.state.nextId }); }\n    }catch(e){}\n  }\n  componentDidUpdate(prevProps, prevState){\n    if(prevState.payments !== this.state.payments || prevState.nextId !== this.state.nextId){\n      try{ localStorage.setItem('casadams_pagos', JSON.stringify({ payments:this.state.payments, nextId:this.state.nextId })); }catch(e){}\n    }\n  }\n  mkToggle(id){ return (e) => { if(e&&e.stopPropagation) e.stopPropagation(); this.togglePaid(id); }; }\n  longDate(s){ const d = this.toDate(s); return d.getDate() + ' de ' + this.meses[d.getMonth()].toLowerCase(); }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
